<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Marketing</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #f5f5f3;
  --bg2: #ffffff;
  --bg3: #efefec;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #a0a09b;
  --green: #1D9E75;
  --green2: #0F6E56;
  --radius: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --text: #f0f0ec;
    --text2: #a0a09b;
    --text3: #6b6b67;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.logo i{color:var(--green);font-size:18px}
.nav{display:flex;gap:2px}
.nav-btn{background:none;border:none;padding:7px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg3);color:var(--text);font-weight:500}
.nav-btn i{font-size:15px}
.ml-auto{margin-left:auto;display:flex;gap:7px;align-items:center}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-status i{font-size:13px}
.sync-ok{color:var(--green)}
.sync-err{color:#E24B4A}
.sync-ing{color:#EF9F27}
.btn-primary{background:var(--green);color:#fff;border:none;padding:7px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary:hover{background:var(--green2)}
.btn-sec{background:none;border:1px solid var(--border2);padding:6px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-sec:hover{background:var(--bg3);color:var(--text)}
.content{flex:1;padding:18px 20px;max-width:1400px;width:100%;margin:0 auto}

/* CONFIG BANNER */
.config-banner{background:#FAEEDA;border:1px solid #FAC775;border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.config-banner i{font-size:20px;color:#633806;flex-shrink:0;margin-top:1px}
.config-banner-text{flex:1}
.config-banner-title{font-size:14px;font-weight:600;color:#412402;margin-bottom:4px}
.config-banner-desc{font-size:13px;color:#633806;line-height:1.5}
.config-banner input{width:100%;margin-top:8px;border:1px solid #FAC775;border-radius:var(--radius);padding:7px 10px;font-size:13px;background:#fff;color:#412402}
.config-banner input:focus{outline:none;border-color:#EF9F27}

/* KANBAN */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start}
.kol{background:var(--bg3);border-radius:var(--radius-lg);padding:10px;border:1px solid var(--border)}
.kol-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kol-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.kol-count{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1px 7px;font-size:11px;color:var(--text2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-brand{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block;margin-bottom:5px}
.card-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:7px;line-height:1.4}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-area{font-size:10px;color:var(--text3)}
.avatar-sm{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-date{font-size:10px;color:var(--text3)}
.add-card-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius);padding:7px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
.add-card-btn:hover{border-color:var(--border2);color:var(--text2)}

/* LISTA */
.list-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select,.search-input{border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--bg2);color:var(--text);cursor:pointer}
.search-input{flex:1;min-width:180px;cursor:text}
.search-input:focus,.filter-select:focus{outline:none;border-color:var(--border2)}
.task-table{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;table-layout:fixed;border-collapse:collapse}
.task-table th{font-size:12px;font-weight:500;color:var(--text2);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3)}
.task-table td{font-size:12px;padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:var(--bg3)}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.status-backlog{background:#F1EFE8;color:#444441}
.status-todo{background:#E6F1FB;color:#0C447C}
.status-progress{background:#FAEEDA;color:#633806}
.status-review{background:#FBEAF0;color:#72243E}
.status-done{background:#EAF3DE;color:#27500A}
.prio-baixa{background:#E1F5EE;color:#085041}
.prio-media{background:#E6F1FB;color:#0C447C}
.prio-alta{background:#FAEEDA;color:#633806}
.prio-urgente{background:#FCEBEB;color:#791F1F}
.brand-0{background:#E1F5EE;color:#085041}
.brand-1{background:#E6F1FB;color:#0C447C}
.brand-2{background:#FAEEDA;color:#633806}
.brand-3{background:#FBEAF0;color:#72243E}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric-card{background:var(--bg3);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.metric-value{font-size:24px;font-weight:600;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.dash-card-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:5px}
.person-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.person-bar-bg{flex:1;background:var(--bg3);border-radius:20px;height:5px;overflow:hidden}
.person-bar{height:5px;border-radius:20px;background:var(--green)}
.person-name{font-size:12px;color:var(--text);min-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.donut-wrap{display:flex;align-items:center;gap:16px}
.legend{display:flex;flex-direction:column;gap:7px;flex:1}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-val{margin-left:auto;font-weight:500;color:var(--text)}
.overdue-item{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer}
.overdue-item:last-child{border-bottom:none}
.overdue-title{flex:1;font-size:12px;color:var(--text)}
.overdue-badge{font-size:10px;color:#A32D2D;font-weight:600;background:#FCEBEB;padding:2px 6px;border-radius:20px}
.upcoming-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
.upcoming-item:last-child{border-bottom:none}
.upcoming-date{font-size:11px;color:var(--text3);min-width:52px}
.dash-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}

/* BACKLOG */
.backlog-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.backlog-section-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.backlog-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.backlog-item:last-child{border-bottom:none}
.backlog-item-title{flex:1;font-size:13px;color:var(--text);line-height:1.5}
.backlog-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.icon-btn:hover{color:var(--text);background:var(--bg3)}
.icon-btn i{font-size:15px}
.quick-add{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.quick-add input,.quick-add select{border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--bg3);color:var(--text)}
.quick-add input{flex:1;min-width:160px}

/* TEAM */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.member-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;display:flex;align-items:center;gap:10px}
.member-info{flex:1;min-width:0}
.member-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-area{font-size:11px;color:var(--text2)}
.member-tasks{font-size:11px;color:var(--text3);margin-top:2px}
.color-picker-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch.selected{border-color:var(--text)}
.color-swatch:hover{transform:scale(1.2)}

/* COMMENTS */
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-body{flex:1;background:var(--bg3);border-radius:var(--radius);padding:8px 10px}
.comment-author{font-size:11px;font-weight:600;color:var(--text2)}
.comment-text{font-size:13px;color:var(--text);margin-top:2px;line-height:1.5}
.comment-date{font-size:10px;color:var(--text3);margin-top:3px}
.comment-input-row{display:flex;gap:7px;align-items:flex-end;margin-top:8px}
.comment-input-row textarea{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--bg2);color:var(--text);resize:none;height:58px;font-family:inherit}
.comment-input-row textarea:focus{outline:none;border-color:var(--border2)}
.comment-who{border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:12px;background:var(--bg2);color:var(--text)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:200}
.modal{background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);width:540px;max-width:96%;padding:20px;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-label{font-size:12px;color:var(--text2);font-weight:500}
.form-input{border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;background:var(--bg2);color:var(--text);width:100%}
.form-input:focus{outline:none;border-color:var(--border2)}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border2);padding:7px 13px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text2)}
.btn-cancel:hover{background:var(--bg3)}
.btn-danger{background:none;border:1px solid #F09595;padding:7px 13px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:#A32D2D}
.btn-danger:hover{background:#FCEBEB}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.hidden{display:none!important}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.empty-state i{font-size:28px;margin-bottom:8px;display:block}
.badge-danger{background:#FCEBEB;color:#791F1F;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600;margin-left:4px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:600;color:var(--text)}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="logo"><i class="ti ti-chart-arrows-vertical"></i> Pauta Mkt</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showView('kanban')" id="btn-kanban"><i class="ti ti-layout-columns"></i> Kanban</button>
      <button class="nav-btn" onclick="showView('lista')" id="btn-lista"><i class="ti ti-list"></i> Lista</button>
      <button class="nav-btn" onclick="showView('backlog')" id="btn-backlog"><i class="ti ti-inbox"></i> Backlog</button>
      <button class="nav-btn" onclick="showView('dashboard')" id="btn-dashboard"><i class="ti ti-chart-bar"></i> Dashboard</button>
      <button class="nav-btn" onclick="showView('time')" id="btn-time"><i class="ti ti-users"></i> Time</button>
      <button class="nav-btn" onclick="showView('config')" id="btn-config"><i class="ti ti-settings"></i> Config</button>
    </nav>
    <div class="ml-auto">
      <span class="sync-status" id="sync-status"><i class="ti ti-cloud"></i> <span id="sync-txt">offline</span></span>
      <button class="btn-sec" onclick="exportCSV()"><i class="ti ti-download"></i> CSV</button>
      <button class="btn-sec" onclick="importJSON()"><i class="ti ti-upload"></i> Importar</button>
      <button class="btn-sec" onclick="exportJSON()"><i class="ti ti-database-export"></i> Backup</button>
      <button class="btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Nova tarefa</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal-box"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Cole aqui a URL do seu Google Apps Script após configurar (veja guia no final)
let SCRIPT_URL = localStorage.getItem('pautamkt_scripturl') || '';

const PALETTE = ['#9FE1CB','#B5D4F4','#F4C0D1','#FAC775','#C0DD97','#F0997B','#AFA9EC','#F5C4B3','#5DCAA5','#85B7EB','#ED93B1','#97C459'];
const PTEXT   = {'#9FE1CB':'#085041','#B5D4F4':'#0C447C','#F4C0D1':'#72243E','#FAC775':'#633806','#C0DD97':'#27500A','#F0997B':'#993C1D','#AFA9EC':'#3C3489','#F5C4B3':'#712B13','#5DCAA5':'#04342C','#85B7EB':'#042C53','#ED93B1':'#4B1528','#97C459':'#173404'};
const AREAS   = ['Social Media','Design','Tráfego Pago','Trade','Outro'];
const STATUSES= ['A fazer','Em andamento','Em revisão','Concluído','Backlog'];
const PRIOS   = ['Baixa','Média','Alta','Urgente'];

let tasks=[], members=[], brands=[], comments={};
let editId=null, currentView='kanban';
let filterStatus='', filterBrand='', filterArea='', filterPrio='', searchQ='';
let dashPeriod='all', dashPerson='', dashBrand='';
let syncing=false;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function initials(n){ if(!n)return'?'; const p=n.trim().split(' '); return p.length>1?p[0][0]+p[p.length-1][0]:p[0][0] }
function aStyle(name){ const m=members.find(x=>x.name===name); const bg=m?m.color:PALETTE[0]; return `background:${bg};color:${PTEXT[bg]||'#333'}` }
function brandCls(b){ const i=brands.indexOf(b); return `brand-${Math.min(i<0?0:i,3)}` }
function statusCls(s){ const m={'A fazer':'status-todo','Em andamento':'status-progress','Em revisão':'status-review','Concluído':'status-done','Backlog':'status-backlog'}; return m[s]||'status-backlog' }
function prioCls(p){ return 'prio-'+(p||'media').toLowerCase().replace('é','e') }
function prioColor(p){ if(p==='Urgente')return'#E24B4A'; if(p==='Alta')return'#EF9F27'; if(p==='Média')return'#378ADD'; return'#1D9E75' }
function isOverdue(t){ if(!t.end||t.status==='Concluído')return false; return new Date(t.end)<new Date() }
function daysOverdue(t){ if(!t.end)return 0; return Math.floor((new Date()-new Date(t.end))/864e5) }
function fmtDate(d){ if(!d)return'—'; const p=d.split('-'); return`${p[2]}/${p[1]}` }
function fmtDT(ts){ if(!ts)return''; const d=new Date(ts); return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` }

// ─── STORAGE LOCAL ────────────────────────────────────────────────────────────
const LS_KEY = 'pautamkt_data_v3';
function saveLocal(){
  localStorage.setItem(LS_KEY, JSON.stringify({tasks,members,brands,comments}));
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d=JSON.parse(raw); tasks=d.tasks||[]; members=d.members||[]; brands=d.brands||[]; comments=d.comments||{}; }
  }catch(e){}
}

// ─── GOOGLE SHEETS SYNC ───────────────────────────────────────────────────────
function setSyncStatus(state, msg){
  const el=document.getElementById('sync-status');
  const txt=document.getElementById('sync-txt');
  if(!el)return;
  el.className='sync-status sync-'+state;
  txt.textContent=msg;
}

async function syncToSheets(){
  if(!SCRIPT_URL){ setSyncStatus('err','sem URL'); return; }
  if(syncing)return;
  syncing=true;
  setSyncStatus('ing','salvando...');
  try{
    const payload = encodeURIComponent(JSON.stringify({ tasks, members, brands, comments }));
    const res = await fetch(SCRIPT_URL+'?action=save&data='+payload, {redirect:'follow'});
    const text = await res.text();
    const json = JSON.parse(text);
    if(json.ok){ setSyncStatus('ok','salvo ✓ '+fmtDT(Date.now())); }
    else{ setSyncStatus('err','erro: '+json.error); }
  }catch(e){ setSyncStatus('err','falha: '+e.message); }
  syncing=false;
}

async function syncFromSheets(){
  if(!SCRIPT_URL){ return false; }
  setSyncStatus('ing','carregando...');
  try{
    const res = await fetch(SCRIPT_URL+'?action=load', {redirect:'follow'});
    const text = await res.text();
    const json = JSON.parse(text);
    if(json.ok && json.data){
      const d = json.data;
      tasks    = d.tasks    || tasks;
      members  = d.members  || members;
      brands   = d.brands   || brands;
      comments = d.comments || comments;
      saveLocal();
      setSyncStatus('ok','sincronizado ✓');
      return true;
    } else {
      setSyncStatus('err', json.error||'sem dados');
      return false;
    }
  }catch(e){ setSyncStatus('err','falha: '+e.message); return false; }
}

function persist(){
  saveLocal();
  if(SCRIPT_URL) syncToSheets();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  loadLocal();
  if(!members.length) members = defaultMembers();
  if(!brands.length)  brands  = ['Marca A','Marca B','Marca C'];
  if(!tasks.length)   tasks   = sampleTasks();
  render();
  if(SCRIPT_URL){
    const ok = await syncFromSheets();
    if(ok) render();
  } else {
    setSyncStatus('err','configure a URL');
  }
}

function defaultMembers(){
  const data=[['Ana Lima','Social Media'],['Bruno Melo','Design'],['Carol Nunes','Tráfego Pago'],['Diego Paz','Trade'],['Elena Cruz','Social Media'],['Felipe Rosa','Design'],['Giovanna Leal','Social Media'],['Hugo Barros','Design'],['Isabela Torres','Tráfego Pago'],['João Vitor','Trade']];
  return data.map(([name,area],i)=>({id:uid(),name,area,color:PALETTE[i%PALETTE.length]}));
}

function sampleTasks(){
  const add=n=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};
  return[
    {id:uid(),title:'Campanha Dia das Mães — Marca A',brand:brands[0],area:'Social Media',prio:'Urgente',status:'Em andamento',start:add(-5),end:add(2),owner:'Ana Lima'},
    {id:uid(),title:'Artes para cardápio de inverno',brand:brands[1],area:'Design',prio:'Alta',status:'Em revisão',start:add(-3),end:add(1),owner:'Bruno Melo'},
    {id:uid(),title:'Relatório tráfego pago — Abril',brand:brands[0],area:'Tráfego Pago',prio:'Média',status:'Concluído',start:add(-10),end:add(-2),owner:'Carol Nunes'},
    {id:uid(),title:'Flyer PDV restaurante centro',brand:brands[2],area:'Trade',prio:'Alta',status:'A fazer',start:add(1),end:add(7),owner:'Diego Paz'},
    {id:uid(),title:'Roteiro de reels para São João',brand:brands[0],area:'Social Media',prio:'Média',status:'A fazer',start:add(2),end:add(10),owner:'Elena Cruz'},
    {id:uid(),title:'Setup de campanhas Google Ads',brand:brands[1],area:'Tráfego Pago',prio:'Alta',status:'Em andamento',start:add(-2),end:add(3),owner:'Felipe Rosa'},
    {id:uid(),title:'Planejamento de conteúdo Junho',brand:brands[1],area:'Social Media',prio:'Média',status:'A fazer',start:add(5),end:add(12),owner:'Isabela Torres'},
    {id:uid(),title:'Pesquisa de influenciadores',brand:'',area:'Outro',prio:'Baixa',status:'Backlog',start:'',end:'',owner:''},
    {id:uid(),title:'Benchmarking concorrentes delivery',brand:'',area:'Outro',prio:'Média',status:'Backlog',start:'',end:'',owner:''},
  ];
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function showView(v){
  currentView=v;
  ['kanban','lista','backlog','dashboard','time','config'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    if(b) b.classList.toggle('active',x===v);
  });
  render();
}

function render(){
  const c=document.getElementById('content');
  if(currentView==='kanban')     c.innerHTML=renderKanban();
  else if(currentView==='lista') c.innerHTML=renderLista();
  else if(currentView==='backlog')c.innerHTML=renderBacklog();
  else if(currentView==='dashboard')c.innerHTML=renderDashboard();
  else if(currentView==='time')  c.innerHTML=renderTime();
  else                           c.innerHTML=renderConfig();
  bindEvents();
}

// ─── KANBAN ───────────────────────────────────────────────────────────────────
function renderKanban(){
  let h='<div class="kanban-board">';
  STATUSES.forEach(col=>{
    const ct=tasks.filter(t=>t.status===col);
    h+=`<div class="kol"><div class="kol-header"><span class="kol-title">${col}</span><span class="kol-count">${ct.length}</span></div>`;
    ct.forEach(t=>{
      const over=isOverdue(t); const nc=(comments[t.id]||[]).length;
      h+=`<div class="card" onclick="openEditTask('${t.id}')">`;
      if(t.brand) h+=`<span class="card-brand ${brandCls(t.brand)}">${t.brand}</span>`;
      h+=`<div class="card-title" style="${over?'color:#A32D2D':''}">${t.title}</div>`;
      h+=`<div class="card-meta"><span class="card-area">${t.area||''}</span><div style="display:flex;align-items:center;gap:4px">`;
      if(nc) h+=`<span style="font-size:10px;color:var(--text3)"><i class="ti ti-message" style="font-size:11px"></i>${nc}</span>`;
      h+=`<span class="priority-dot" style="background:${prioColor(t.prio)}" title="${t.prio}"></span>`;
      if(t.owner) h+=`<div class="avatar-sm" style="${aStyle(t.owner)}" title="${t.owner}">${initials(t.owner)}</div>`;
      if(t.end) h+=`<span class="card-date" style="${over?'color:#A32D2D':''}">${fmtDate(t.end)}</span>`;
      h+=`</div></div></div>`;
    });
    h+=`<button class="add-card-btn" onclick="openModalWithStatus('${col}')"><i class="ti ti-plus"></i> Adicionar</button></div>`;
  });
  return h+'</div>';
}

// ─── LISTA ────────────────────────────────────────────────────────────────────
function renderLista(){
  let ft=tasks.filter(t=>{
    if(filterStatus&&t.status!==filterStatus) return false;
    if(filterBrand &&t.brand !==filterBrand)  return false;
    if(filterArea  &&t.area  !==filterArea)   return false;
    if(filterPrio  &&t.prio  !==filterPrio)   return false;
    if(searchQ&&!t.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
  let h=`<div class="list-filters">
    <input class="search-input" id="search-input" placeholder="Buscar tarefa..." value="${searchQ}">
    <select class="filter-select" onchange="fc('status',this.value)"><option value="">Todos status</option>${STATUSES.map(s=>`<option value="${s}"${filterStatus===s?' selected':''}>${s}</option>`).join('')}</select>
    <select class="filter-select" onchange="fc('brand',this.value)"><option value="">Todas marcas</option>${brands.map(b=>`<option value="${b}"${filterBrand===b?' selected':''}>${b}</option>`).join('')}</select>
    <select class="filter-select" onchange="fc('area',this.value)"><option value="">Todas áreas</option>${AREAS.map(a=>`<option value="${a}"${filterArea===a?' selected':''}>${a}</option>`).join('')}</select>
    <select class="filter-select" onchange="fc('prio',this.value)"><option value="">Todas prios</option>${PRIOS.map(p=>`<option value="${p}"${filterPrio===p?' selected':''}>${p}</option>`).join('')}</select>
  </div>
  <table class="task-table"><thead><tr>
    <th style="width:33%">Tarefa</th><th style="width:9%">Marca</th><th style="width:10%">Área</th>
    <th style="width:9%">Prioridade</th><th style="width:10%">Status</th><th style="width:13%">Responsável</th>
    <th style="width:8%">Entrega</th><th style="width:8%"></th>
  </tr></thead><tbody>`;
  if(!ft.length) h+=`<tr><td colspan="8"><div class="empty-state"><i class="ti ti-search"></i>Nenhuma tarefa encontrada</div></td></tr>`;
  ft.forEach(t=>{
    const over=isOverdue(t); const nc=(comments[t.id]||[]).length;
    h+=`<tr onclick="openEditTask('${t.id}')" style="cursor:pointer">
      <td style="${over?'color:#A32D2D':''}">${t.title}${over?`<span class="badge-danger">+${daysOverdue(t)}d</span>`:''}${nc?` <i class="ti ti-message" style="font-size:11px;color:var(--text3)"></i>`:''}</td>
      <td>${t.brand?`<span class="pill ${brandCls(t.brand)}">${t.brand}</span>`:'—'}</td>
      <td style="color:var(--text2)">${t.area||'—'}</td>
      <td><span class="pill ${prioCls(t.prio)}">${t.prio||'—'}</span></td>
      <td><span class="pill ${statusCls(t.status)}">${t.status}</span></td>
      <td><div style="display:flex;align-items:center;gap:5px">${t.owner?`<div class="avatar" style="${aStyle(t.owner)}">${initials(t.owner)}</div><span style="font-size:12px">${t.owner.split(' ')[0]}</span>`:'<span style="color:var(--text3)">—</span>'}</div></td>
      <td style="${over?'color:#A32D2D':'color:var(--text2)'}">${fmtDate(t.end)}</td>
      <td><button class="icon-btn" onclick="event.stopPropagation();deleteTask('${t.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  });
  return h+`</tbody></table>`;
}

// ─── BACKLOG ──────────────────────────────────────────────────────────────────
function renderBacklog(){
  const ideas=tasks.filter(t=>t.status==='Backlog');
  const unassigned=tasks.filter(t=>!t.owner&&t.status!=='Backlog');
  let h=`<div class="backlog-section">
    <div class="backlog-section-title"><i class="ti ti-bulb"></i> Ideias e anotações (${ideas.length})</div>`;
  ideas.forEach(t=>{
    h+=`<div class="backlog-item">
      <div class="backlog-item-title">${t.title}${t.brand?` <span class="pill ${brandCls(t.brand)}" style="font-size:10px">${t.brand}</span>`:''}</div>
      <div class="backlog-actions">
        <button class="icon-btn" title="Transformar em tarefa" onclick="promoteBacklog('${t.id}')"><i class="ti ti-arrow-up-right"></i></button>
        <button class="icon-btn" title="Editar" onclick="openEditTask('${t.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" title="Excluir" onclick="deleteTask('${t.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  if(!ideas.length) h+=`<div class="empty-state"><i class="ti ti-inbox"></i>Nenhuma ideia registrada</div>`;
  h+=`<div class="quick-add">
    <input id="backlog-input" placeholder="Anotar ideia rapidamente... (Enter)">
    <select id="backlog-brand"><option value="">Sem marca</option>${brands.map(b=>`<option value="${b}">${b}</option>`).join('')}</select>
    <button class="btn-primary" onclick="quickAddBacklog()"><i class="ti ti-plus"></i> Anotar</button>
  </div></div>`;
  if(unassigned.length){
    h+=`<div class="backlog-section"><div class="backlog-section-title"><i class="ti ti-user-x"></i> Sem responsável (${unassigned.length})</div>`;
    unassigned.forEach(t=>{
      h+=`<div class="backlog-item"><div><div class="backlog-item-title">${t.title}</div><div style="display:flex;gap:5px;margin-top:3px"><span class="pill ${statusCls(t.status)}" style="font-size:10px">${t.status}</span>${t.brand?`<span class="pill ${brandCls(t.brand)}" style="font-size:10px">${t.brand}</span>`:''}</div></div>
        <div class="backlog-actions"><button class="icon-btn" onclick="openEditTask('${t.id}')"><i class="ti ti-edit"></i></button><button class="icon-btn" onclick="deleteTask('${t.id}')"><i class="ti ti-trash"></i></button></div></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  let filtered=tasks.filter(t=>t.status!=='Backlog');
  if(dashPerson) filtered=filtered.filter(t=>t.owner===dashPerson);
  if(dashBrand)  filtered=filtered.filter(t=>t.brand===dashBrand);
  if(dashPeriod!=='all'){
    const days={'7':7,'30':30,'90':90}[dashPeriod];
    const cutoff=new Date(Date.now()-days*864e5);
    filtered=filtered.filter(t=>{const d=t.end?new Date(t.end):t.start?new Date(t.start):null; return d&&d>=cutoff;});
  }
  const done=filtered.filter(t=>t.status==='Concluído');
  const inprog=filtered.filter(t=>t.status==='Em andamento');
  const overdue=filtered.filter(t=>isOverdue(t));
  const pct=filtered.length?Math.round(done.length/filtered.length*100):0;
  const byPerson={};
  filtered.forEach(t=>{if(t.owner){if(!byPerson[t.owner])byPerson[t.owner]={total:0,done:0}; byPerson[t.owner].total++; if(t.status==='Concluído')byPerson[t.owner].done++;}});
  const persons=Object.entries(byPerson).sort((a,b)=>b[1].total-a[1].total);
  const maxP=persons.length?persons[0][1].total:1;
  const bColors=['#1D9E75','#378ADD','#EF9F27','#D4537E'];
  const byBrand={};brands.forEach(b=>{byBrand[b]=filtered.filter(t=>t.brand===b).length});
  const totalB=Object.values(byBrand).reduce((a,b)=>a+b,0)||1;
  const donutR=40,cx=50,cy=50,circ=2*Math.PI*donutR; let off=0;
  const segs=brands.map((k,i)=>{const p2=byBrand[k]/totalB;const dash=p2*circ;const s=`<circle cx="${cx}" cy="${cy}" r="${donutR}" fill="none" stroke="${bColors[i%bColors.length]}" stroke-width="13" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=dash;return s;}).join('');
  const byArea={};filtered.forEach(t=>{if(t.area){if(!byArea[t.area])byArea[t.area]=0;byArea[t.area]++;}});
  const overdueList=overdue.sort((a,b)=>daysOverdue(b)-daysOverdue(a)).slice(0,5);
  const upcoming=filtered.filter(t=>t.end&&t.status!=='Concluído'&&!isOverdue(t)).sort((a,b)=>new Date(a.end)-new Date(b.end)).slice(0,5);

  let h=`<div class="dash-filters">
    <select class="filter-select" onchange="dashFilter('period',this.value)">
      <option value="all"${dashPeriod==='all'?' selected':''}>Todo período</option>
      <option value="7"${dashPeriod==='7'?' selected':''}>Últimos 7 dias</option>
      <option value="30"${dashPeriod==='30'?' selected':''}>Últimos 30 dias</option>
      <option value="90"${dashPeriod==='90'?' selected':''}>Últimos 90 dias</option>
    </select>
    <select class="filter-select" onchange="dashFilter('person',this.value)">
      <option value="">Todos do time</option>${members.map(m=>`<option value="${m.name}"${dashPerson===m.name?' selected':''}>${m.name}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="dashFilter('brand',this.value)">
      <option value="">Todas marcas</option>${brands.map(b=>`<option value="${b}"${dashBrand===b?' selected':''}>${b}</option>`).join('')}
    </select>
  </div>
  <div class="dash-grid">
    <div class="metric-card"><div class="metric-label"><i class="ti ti-checklist"></i>Total tarefas</div><div class="metric-value">${filtered.length}</div><div class="metric-sub">no período</div></div>
    <div class="metric-card"><div class="metric-label"><i class="ti ti-circle-check"></i>Concluídas</div><div class="metric-value">${done.length}</div><div class="metric-sub">${pct}% do total</div></div>
    <div class="metric-card"><div class="metric-label"><i class="ti ti-loader"></i>Em andamento</div><div class="metric-value">${inprog.length}</div><div class="metric-sub">tarefas ativas</div></div>
    <div class="metric-card"><div class="metric-label" style="${overdue.length?'color:#A32D2D':''}"><i class="ti ti-alert-triangle"></i>Atrasadas</div><div class="metric-value" style="${overdue.length?'color:#A32D2D':''}">${overdue.length}</div><div class="metric-sub">precisam atenção</div></div>
  </div>
  <div class="dash-row">
    <div class="dash-card"><div class="dash-card-title"><i class="ti ti-trophy"></i> Ranking de produtividade</div>`;
  persons.slice(0,8).forEach(([name,d])=>{
    h+=`<div class="person-row"><div class="avatar" style="${aStyle(name)};width:24px;height:24px;font-size:10px">${initials(name)}</div><span class="person-name">${name.split(' ')[0]}</span><div class="person-bar-bg"><div class="person-bar" style="width:${Math.round(d.total/maxP*100)}%"></div></div><span style="font-size:11px;color:var(--text2);min-width:18px;text-align:right">${d.total}</span><span style="font-size:11px;color:#1D9E75;min-width:28px;text-align:right">${d.done}✓</span></div>`;
  });
  if(!persons.length) h+=`<div class="empty-state" style="padding:16px"><i class="ti ti-users"></i>Sem dados</div>`;
  h+=`</div>
    <div class="dash-card"><div class="dash-card-title"><i class="ti ti-chart-pie"></i> Por marca</div>
      <div class="donut-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100"><circle cx="${cx}" cy="${cy}" r="${donutR}" fill="none" stroke="#eee" stroke-width="13"/>${segs}<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text)">${totalB}</text></svg>
        <div class="legend">`;
  brands.forEach((k,i)=>{h+=`<div class="legend-item"><span class="legend-dot" style="background:${bColors[i%bColors.length]}"></span>${k}<span class="legend-val">${byBrand[k]} (${Math.round(byBrand[k]/totalB*100)}%)</span></div>`;});
  h+=`</div></div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px"><div class="dash-card-title" style="margin-bottom:8px"><i class="ti ti-tag"></i> Por área</div>
      ${Object.entries(byArea).map(([k,v])=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px"><span style="color:var(--text2);min-width:90px">${k}</span><div class="person-bar-bg" style="flex:1"><div class="person-bar" style="width:${Math.round(v/filtered.length*100)}%;background:#378ADD"></div></div><span style="color:var(--text2);min-width:18px">${v}</span></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="dash-row">
    <div class="dash-card"><div class="dash-card-title" style="color:#A32D2D"><i class="ti ti-clock-exclamation"></i> Atrasadas</div>`;
  if(!overdueList.length) h+=`<div class="empty-state" style="padding:14px"><i class="ti ti-circle-check"></i>Nenhuma tarefa atrasada!</div>`;
  overdueList.forEach(t=>{h+=`<div class="overdue-item" onclick="openEditTask('${t.id}')"><div class="avatar" style="${aStyle(t.owner)};width:22px;height:22px;font-size:9px">${initials(t.owner)}</div><span class="overdue-title">${t.title}</span><span class="overdue-badge">+${daysOverdue(t)}d</span></div>`;});
  h+=`</div>
    <div class="dash-card"><div class="dash-card-title"><i class="ti ti-calendar"></i> Próximas entregas</div>`;
  if(!upcoming.length) h+=`<div class="empty-state" style="padding:14px"><i class="ti ti-calendar"></i>Sem entregas previstas</div>`;
  upcoming.forEach(t=>{h+=`<div class="upcoming-item" onclick="openEditTask('${t.id}')"><span class="upcoming-date">${fmtDate(t.end)}</span><div class="avatar" style="${aStyle(t.owner)};width:20px;height:20px;font-size:9px">${initials(t.owner)}</div><span style="flex:1;font-size:12px">${t.title}</span><span class="pill ${statusCls(t.status)}" style="font-size:10px">${t.status}</span></div>`;});
  h+=`</div></div>`;
  return h;
}

// ─── TIME ─────────────────────────────────────────────────────────────────────
function renderTime(){
  let h=`<div class="section-header"><span class="section-title">Membros do time (${members.length})</span>
    <div style="display:flex;gap:7px">
      <button class="btn-sec" onclick="openMemberModal()"><i class="ti ti-plus"></i> Novo membro</button>
      <button class="btn-sec" onclick="openBrandsModal()"><i class="ti ti-building-store"></i> Gerenciar marcas</button>
    </div>
  </div>
  <div class="team-grid">`;
  members.forEach(m=>{
    const mt=tasks.filter(t=>t.owner===m.name&&t.status!=='Backlog');
    const done=mt.filter(t=>t.status==='Concluído').length;
    h+=`<div class="member-card">
      <div class="avatar" style="background:${m.color};color:${PTEXT[m.color]||'#333'};width:40px;height:40px;font-size:15px;flex-shrink:0">${initials(m.name)}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-area">${m.area}</div>
        <div class="member-tasks">${mt.length} tarefas · ${done} concluídas</div>
        <div class="color-picker-row">${PALETTE.map(c=>`<div class="color-swatch${m.color===c?' selected':''}" style="background:${c}" onclick="changeMemberColor('${m.id}','${c}')"></div>`).join('')}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="icon-btn" onclick="openMemberModal('${m.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="deleteMember('${m.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  h+=`</div>`;
  if(brands.length){
    h+=`<div class="backlog-section"><div class="backlog-section-title"><i class="ti ti-building-store"></i> Marcas cadastradas</div>`;
    brands.forEach((b,i)=>{h+=`<div class="backlog-item"><span class="pill ${brandCls(b)}">${b}</span><div class="backlog-actions"><button class="icon-btn" onclick="removeBrand(${i})"><i class="ti ti-trash"></i></button></div></div>`;});
    h+=`</div>`;
  }
  return h;
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function renderConfig(){
  const connected = !!SCRIPT_URL;
  return`<div style="max-width:680px">
    <div class="section-title" style="margin-bottom:20px">Configurações</div>

    <div class="backlog-section">
      <div class="backlog-section-title"><i class="ti ti-brand-google"></i> Sincronização com Google Sheets</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">
        Cole abaixo a URL gerada pelo Google Apps Script para sincronizar os dados com uma planilha.<br>
        Os dados ficam salvos localmente no navegador <strong>e</strong> na planilha — acesso de qualquer lugar.
      </div>
      <div class="form-group">
        <label class="form-label">URL do Apps Script</label>
        <input class="form-input" id="script-url-input" placeholder="https://script.google.com/macros/s/..." value="${SCRIPT_URL}" style="font-size:12px">
      </div>
      <div style="display:flex;gap:7px;margin-top:4px">
        <button class="btn-primary" onclick="saveScriptUrl()"><i class="ti ti-check"></i> Salvar URL</button>
        ${connected?`<button class="btn-sec" onclick="syncFromSheets().then(()=>render())"><i class="ti ti-refresh"></i> Forçar sincronização</button>`:''}
      </div>
      ${connected?`<div style="margin-top:10px;font-size:12px;color:#1D9E75"><i class="ti ti-circle-check"></i> URL configurada — dados sincronizando automaticamente</div>`:`<div style="margin-top:10px;font-size:12px;color:var(--text3)"><i class="ti ti-info-circle"></i> Sem URL configurada — dados salvos apenas neste navegador</div>`}
    </div>

    <div class="backlog-section" style="margin-top:14px">
      <div class="backlog-section-title"><i class="ti ti-file-code"></i> Código do Google Apps Script</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">
        Siga os passos abaixo para configurar a sincronização:
      </div>
      <ol style="font-size:13px;color:var(--text2);line-height:2;padding-left:20px">
        <li>Acesse <a href="https://sheets.google.com" target="_blank" style="color:var(--green)">sheets.google.com</a> e crie uma planilha nova</li>
        <li>No menu, vá em <strong>Extensões → Apps Script</strong></li>
        <li>Apague o código existente e cole o código abaixo</li>
        <li>Clique em <strong>Salvar</strong> (ícone de disquete)</li>
        <li>Clique em <strong>Implantar → Nova implantação</strong></li>
        <li>Em "Tipo", escolha <strong>Aplicativo da Web</strong></li>
        <li>Em "Quem tem acesso", selecione <strong>Qualquer pessoa</strong></li>
        <li>Clique em <strong>Implantar</strong> e autorize quando solicitado</li>
        <li>Copie a URL gerada e cole no campo acima</li>
      </ol>
      <div style="margin-top:12px">
        <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px">Código para o Apps Script:</div>
        <pre id="apps-script-code" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:11px;overflow-x:auto;line-height:1.5;color:var(--text)">${appsScriptCode()}</pre>
        <button class="btn-sec" style="margin-top:8px" onclick="copyScriptCode()"><i class="ti ti-copy"></i> Copiar código</button>
      </div>
    </div>

    <div class="backlog-section" style="margin-top:14px">
      <div class="backlog-section-title"><i class="ti ti-database"></i> Backup local</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">
        Exporte todos os dados como JSON para guardar uma cópia ou transferir para outro computador.
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn-sec" onclick="exportJSON()"><i class="ti ti-database-export"></i> Exportar backup (.json)</button>
        <button class="btn-sec" onclick="importJSON()"><i class="ti ti-database-import"></i> Importar backup (.json)</button>
        <button class="btn-sec" onclick="exportCSV()"><i class="ti ti-file-spreadsheet"></i> Exportar tarefas (.csv)</button>
      </div>
    </div>
  </div>`;
}

function appsScriptCode(){
  return `function doGet(e) {
  const action = e.parameter.action;
  if (action === 'load') {
    return load();
  }
  return ContentService
    .createTextOutput(JSON.stringify({ok:false,error:'unknown action'}))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  const body = JSON.parse(e.postData.contents);
  if (body.action === 'save') {
    return save(body.data);
  }
  return ContentService
    .createTextOutput(JSON.stringify({ok:false,error:'unknown action'}))
    .setMimeType(ContentService.MimeType.JSON);
}

function save(data) {
  const props = PropertiesService.getScriptProperties();
  props.setProperty('pautamkt', JSON.stringify(data));
  return ContentService
    .createTextOutput(JSON.stringify({ok:true}))
    .setMimeType(ContentService.MimeType.JSON);
}

function load() {
  const props = PropertiesService.getScriptProperties();
  const raw = props.getProperty('pautamkt');
  if (!raw) {
    return ContentService
      .createTextOutput(JSON.stringify({ok:true,data:null}))
      .setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService
    .createTextOutput(JSON.stringify({ok:true,data:JSON.parse(raw)}))
    .setMimeType(ContentService.MimeType.JSON);
}`;
}

function saveScriptUrl(){
  const val = document.getElementById('script-url-input').value.trim();
  SCRIPT_URL = val;
  localStorage.setItem('pautamkt_scripturl', val);
  if(val){ syncFromSheets().then(()=>render()); }
  else { render(); }
}

function copyScriptCode(){
  navigator.clipboard.writeText(appsScriptCode()).then(()=>{
    const btn = event.target.closest('button');
    if(btn){ btn.innerHTML='<i class="ti ti-check"></i> Copiado!'; setTimeout(()=>{ btn.innerHTML='<i class="ti ti-copy"></i> Copiar código'; },2000); }
  });
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openModal(prefStatus){
  editId=null;
  document.getElementById('modal-box').innerHTML = taskModalHTML(null, prefStatus);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function openModalWithStatus(s){ openModal(s) }
function openEditTask(id){
  editId=id;
  const t=tasks.find(x=>x.id===id);
  document.getElementById('modal-box').innerHTML = taskModalHTML(t);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function openMemberModal(id){
  const m = id ? members.find(x=>x.id===id) : null;
  document.getElementById('modal-box').innerHTML = memberModalHTML(m);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function openBrandsModal(){
  document.getElementById('modal-box').innerHTML = brandsModalHTML();
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); editId=null; }
function closeModalOutside(e){ if(e.target.id==='modal-overlay') closeModal(); }

function taskModalHTML(t, prefStatus){

  return`<div class="modal-header">
    <span class="modal-title">${isEdit?'Editar tarefa':'Nova tarefa'}</span>
    <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  ${isEdit?`<div class="tabs"><button class="tab active" id="tab-info" onclick="switchTab('info')">Detalhes</button><button class="tab" id="tab-comments" onclick="switchTab('comments')">Comentários (${cms.length})</button></div>`:''}
  <div id="tab-info-content">
  <div class="form-group"><label class="form-label">Título da tarefa *</label>
    <input class="form-input" id="f-title" placeholder="Descreva a tarefa..." value="${t?t.title:''}"></div>
  <div class="form-row">
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Marca</label>
      <select class="form-input" id="f-brand"><option value="">Sem marca</option>${brands.map(b=>`<option value="${b}"${t&&t.brand===b?' selected':''}>${b}</option>`).join('')}</select></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Área</label>
      <select class="form-input" id="f-area">${AREAS.map(a=>`<option value="${a}"${t&&t.area===a?' selected':''}>${a}</option>`).join('')}</select></div>
  </div>
  <div class="form-row" style="margin-top:10px">
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Prioridade</label>
      <select class="form-input" id="f-prio">${PRIOS.map(p=>`<option value="${p}"${t?t.prio===p:p==='Média'?' selected':''}>${p}</option>`).join('')}</select></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Status</label>
      <select class="form-input" id="f-status">${STATUSES.map(s=>`<option value="${s}"${t?t.status===s:s===(prefStatus||'A fazer')?' selected':''}>${s}</option>`).join('')}</select></div>
  </div>
  <div class="form-row" style="margin-top:10px">
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Data de início</label>
      <input class="form-input" type="date" id="f-start" value="${t?t.start||'':today}"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Data de entrega</label>
      <input class="form-input" type="date" id="f-end" value="${t?t.end||'':''}"></div>
  </div>
  <div class="form-group" style="margin-top:10px"><label class="form-label">Responsável</label>
    <select class="form-input" id="f-owner"><option value="">Sem responsável</option>${members.map(m=>`<option value="${m.name}"${t&&t.owner===m.name?' selected':''}>${m.name} — ${m.area}</option>`).join('')}</select></div>
  </div>
  ${isEdit?`<div id="tab-comments-content" class="hidden">
    <div id="comments-list">${cms.length?cms.map(c=>`<div class="comment-item"><div class="avatar" style="${aStyle(c.author)};width:28px;height:28px;font-size:11px">${initials(c.author)}</div><div class="comment-body"><div class="comment-author">${c.author}</div><div class="comment-text">${c.text}</div><div class="comment-date">${fmtDT(c.ts)}</div></div></div>`).join(''):'<div class="empty-state" style="padding:14px"><i class="ti ti-message"></i>Nenhum comentário ainda</div>'}</div>
    <div class="comment-input-row">
      <select class="comment-who" id="comment-author"><option value="">Quem comenta?</option>${members.map(m=>`<option value="${m.name}">${m.name.split(' ')[0]}</option>`).join('')}</select>
      <textarea id="comment-text" placeholder="Escreva um comentário..."></textarea>
      <button class="btn-primary" onclick="addComment('${t.id}')"><i class="ti ti-send"></i></button>
    </div>
  </div>`:''}
  <div class="modal-footer">
    ${isEdit?`<button class="btn-danger" onclick="deleteTask('${t.id}');closeModal()">Excluir</button>`:''}
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-primary" onclick="saveTask()"><i class="ti ti-check"></i> Salvar</button>
  </div>`;
}

function memberModalHTML(m){
  return`<div class="modal-header">
    <span class="modal-title">${m?'Editar membro':'Novo membro'}</span>
    <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="form-group"><label class="form-label">Nome completo *</label>
    <input class="form-input" id="m-name" placeholder="Nome do membro..." value="${m?m.name:''}"></div>
  <div class="form-group"><label class="form-label">Área</label>
    <select class="form-input" id="m-area">${AREAS.map(a=>`<option value="${a}"${m&&m.area===a?' selected':''}>${a}</option>`).join('')}</select></div>
  <div class="form-group"><label class="form-label">Cor do avatar</label>
    <div class="color-picker-row" id="m-color-row">${PALETTE.map(c=>`<div class="color-swatch${m&&m.color===c?' selected':c===PALETTE[0]&&!m?' selected':''}" style="background:${c};width:22px;height:22px" data-color="${c}" onclick="selectModalColor('${c}')"></div>`).join('')}</div>
    <input type="hidden" id="m-color" value="${m?m.color:PALETTE[0]}"></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-primary" onclick="saveMember('${m?m.id:''}')">${m?'Salvar':'Adicionar'}</button>
  </div>`;
}

function brandsModalHTML(){
  return`<div class="modal-header">
    <span class="modal-title">Gerenciar marcas</span>
    <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  ${brands.map((b,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span class="pill ${brandCls(b)}">${b}</span><span style="flex:1"></span><button class="icon-btn" onclick="removeBrand(${i});openBrandsModal()"><i class="ti ti-trash"></i></button></div>`).join('')}
  <div style="display:flex;gap:7px;margin-top:14px">
    <input class="form-input" id="new-brand" placeholder="Nome da nova marca..." style="flex:1">
    <button class="btn-primary" onclick="addBrand()"><i class="ti ti-plus"></i> Adicionar</button>
  </div>
  <div class="modal-footer"><button class="btn-primary" onclick="closeModal()">Fechar</button></div>`;
}

function switchTab(tab){
  document.getElementById('tab-info').classList.toggle('active',tab==='info');
  document.getElementById('tab-comments').classList.toggle('active',tab==='comments');
  document.getElementById('tab-info-content').classList.toggle('hidden',tab!=='info');
  document.getElementById('tab-comments-content').classList.toggle('hidden',tab!=='comments');
}

// ─── CRUD ────────────────────────────────────────────────────────────────────
function saveTask(){
  const title = document.getElementById('f-title').value.trim();
  if(!title) return;
  const data = {
    title, brand: document.getElementById('f-brand').value,
    area: document.getElementById('f-area').value, prio: document.getElementById('f-prio').value,
    status: document.getElementById('f-status').value, owner: document.getElementById('f-owner').value,
    start: document.getElementById('f-start').value, end: document.getElementById('f-end').value
  };
  if(editId){ Object.assign(tasks.find(t=>t.id===editId), data); }
  else { data.id=uid(); tasks.push(data); }
  persist(); closeModal(); render();
}
function deleteTask(id){ tasks=tasks.filter(t=>t.id!==id); delete comments[id]; persist(); render(); }
function promoteBacklog(id){ const t=tasks.find(x=>x.id===id); if(t){t.status='A fazer';persist();render();} }

function addComment(taskId){
  const author = document.getElementById('comment-author').value;
  const text   = document.getElementById('comment-text').value.trim();
  if(!author||!text) return;
  if(!comments[taskId]) comments[taskId]=[];
  comments[taskId].push({id:uid(),author,text,ts:Date.now()});
  persist();
  const tab = document.getElementById('tab-comments');
  if(tab) tab.textContent=`Comentários (${comments[taskId].length})`;
  const list = document.getElementById('comments-list');
  if(list) list.innerHTML=comments[taskId].map(c=>`<div class="comment-item"><div class="avatar" style="${aStyle(c.author)};width:28px;height:28px;font-size:11px">${initials(c.author)}</div><div class="comment-body"><div class="comment-author">${c.author}</div><div class="comment-text">${c.text}</div><div class="comment-date">${fmtDT(c.ts)}</div></div></div>`).join('');
  document.getElementById('comment-text').value='';
}

function saveMember(id){
  const name  = document.getElementById('m-name').value.trim(); if(!name)return;
  const area  = document.getElementById('m-area').value;
  const color = document.getElementById('m-color').value;
  if(id){ const m=members.find(x=>x.id===id); if(m){m.name=name;m.area=area;m.color=color;} }
  else { members.push({id:uid(),name,area,color}); }
  persist(); closeModal(); render();
}
function deleteMember(id){
  const m=members.find(x=>x.id===id);
  if(m) tasks.forEach(t=>{if(t.owner===m.name)t.owner='';});
  members=members.filter(x=>x.id!==id); persist(); render();
}
function changeMemberColor(id,color){ const m=members.find(x=>x.id===id); if(m){m.color=color;persist();render();} }
function selectModalColor(c){
  document.getElementById('m-color').value=c;
  document.querySelectorAll('#m-color-row .color-swatch').forEach(el=>{ el.classList.toggle('selected',el.dataset.color===c); });
}
function addBrand(){
  const inp=document.getElementById('new-brand'); const name=inp?.value?.trim();
  if(!name||brands.includes(name))return; brands.push(name); persist(); openBrandsModal();
}
function removeBrand(i){ brands.splice(i,1); persist(); if(currentView==='time')render(); }

function quickAddBacklog(){
  const inp=document.getElementById('backlog-input');
  const brand=document.getElementById('backlog-brand');
  const title=inp?.value?.trim(); if(!title)return;
  tasks.push({id:uid(),title,brand:brand?.value||'',area:'Outro',prio:'Média',status:'Backlog',owner:'',start:'',end:''});
  persist(); inp.value=''; if(brand)brand.value=''; render();
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function fc(type,val){
  if(type==='status')filterStatus=val; else if(type==='brand')filterBrand=val;
  else if(type==='area')filterArea=val; else if(type==='prio')filterPrio=val;
  render();
}
function dashFilter(type,val){
  if(type==='period')dashPeriod=val; else if(type==='person')dashPerson=val; else if(type==='brand')dashBrand=val;
  render();
}

// ─── IMPORT / EXPORT ─────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Título','Marca','Área','Prioridade','Status','Responsável','Início','Entrega']];
  tasks.forEach(t=>rows.push([t.title,t.brand,t.area,t.prio,t.status,t.owner,t.start,t.end]));
  const csv=rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('pauta-marketing.csv','data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv));
}
function exportJSON(){
  const data=JSON.stringify({tasks,members,brands,comments},null,2);
  dl('pauta-marketing-backup.json','data:application/json;charset=utf-8,'+encodeURIComponent(data));
}
function importJSON(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.tasks){tasks=d.tasks;members=d.members||members;brands=d.brands||brands;comments=d.comments||{}; saveLocal(); render(); alert('Dados importados com sucesso!');}
        else{alert('Arquivo inválido.');}
      }catch{alert('Erro ao ler o arquivo.');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function dl(name,href){ const a=document.createElement('a');a.href=href;a.download=name;a.click(); }

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function bindEvents(){
  const bi=document.getElementById('backlog-input');
  if(bi) bi.addEventListener('keydown',e=>{if(e.key==='Enter')quickAddBacklog()});
  const si=document.getElementById('search-input');
  if(si) si.addEventListener('input',e=>{searchQ=e.target.value;render()});
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
